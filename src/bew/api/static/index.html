<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEW Doku Projekt</title>
<style>
  /* ------------------------------------------------------------------ */
  /* Reset & Basis                                                        */
  /* ------------------------------------------------------------------ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1e1e1e;
    --panel:     #252526;
    --panel2:    #2d2d2d;
    --border:    #3c3c3c;
    --accent:    #007acc;
    --accent2:   #0e639c;
    --text:      #cccccc;
    --text-dim:  #858585;
    --text-bright: #ffffff;
    --green:     #4ec9b0;
    --yellow:    #dcdcaa;
    --red:       #f44747;
    --tag-bg:    #37373d;
    --hover:     #2a2d2e;
    --font: -apple-system, "Segoe UI", sans-serif;
    --mono: "Cascadia Code", "Fira Code", monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }

  /* ------------------------------------------------------------------ */
  /* Layout: Titlebar + 3-Spalten                                        */
  /* ------------------------------------------------------------------ */
  #titlebar {
    height: 35px;
    background: #323233;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  #titlebar .logo { color: var(--accent); font-weight: 700; font-size: 14px; letter-spacing: 0.5px; }
  #titlebar .subtitle { color: var(--text-dim); font-size: 11px; }
  #titlebar .spacer { flex: 1; }
  #titlebar .stats-bar { display: flex; gap: 16px; font-size: 11px; color: var(--text-dim); }
  #titlebar .stats-bar span { display: flex; align-items: center; gap: 4px; }

  #workspace {
    display: flex;
    height: calc(100vh - 35px);
    overflow: hidden;
  }

  /* ------------------------------------------------------------------ */
  /* Explorer (links)                                                    */
  /* ------------------------------------------------------------------ */
  #explorer {
    width: 260px;
    min-width: 180px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .panel-title {
    padding: 8px 12px 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title button {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 16px;
    line-height: 1;
  }
  .panel-title button:hover { background: var(--hover); color: var(--text); }

  #explorer-tree {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .tree-section { margin-bottom: 4px; }
  .tree-section-header {
    padding: 4px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .tree-section-header:hover { color: var(--text); }
  .tree-section-header .arrow { font-size: 10px; transition: transform 0.15s; }
  .tree-section-header.open .arrow { transform: rotate(90deg); }

  .tree-item {
    padding: 3px 12px 3px 24px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    border-radius: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tree-item:hover { background: var(--hover); }
  .tree-item.active { background: var(--accent2); color: var(--text-bright); }
  .tree-item .icon { font-size: 14px; flex-shrink: 0; }
  .tree-item .label { overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .tree-item .badge {
    background: var(--tag-bg);
    color: var(--text-dim);
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 8px;
    flex-shrink: 0;
  }

  .tree-sub-item {
    padding: 3px 12px 3px 36px;
  }

  /* ------------------------------------------------------------------ */
  /* Hauptbereich (Mitte)                                                */
  /* ------------------------------------------------------------------ */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  #main-tabs {
    display: flex;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    gap: 0;
    flex-shrink: 0;
  }
  .tab {
    padding: 7px 16px;
    cursor: pointer;
    border-right: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover { color: var(--text); background: var(--hover); }
  .tab.active { color: var(--text-bright); border-top: 2px solid var(--accent); background: var(--bg); }
  .tab .close-tab {
    color: var(--text-dim);
    font-size: 14px;
    padding: 0 2px;
    border-radius: 2px;
    line-height: 1;
  }
  .tab .close-tab:hover { background: var(--tag-bg); color: var(--text); }

  #main-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  /* Dashboard */
  .dashboard { max-width: 900px; }
  .dashboard h1 { font-size: 22px; color: var(--text-bright); margin-bottom: 6px; }
  .dashboard .subtitle { color: var(--text-dim); margin-bottom: 24px; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
  }
  .stat-card .value { font-size: 28px; font-weight: 700; color: var(--text-bright); }
  .stat-card .label { color: var(--text-dim); font-size: 11px; margin-top: 2px; }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .project-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .project-card:hover { border-color: var(--accent); }
  .project-card .name { font-size: 14px; color: var(--text-bright); font-weight: 500; }
  .project-card .meta { color: var(--text-dim); font-size: 11px; margin-top: 4px; }

  /* Dokument-Tabelle */
  .doc-table { width: 100%; border-collapse: collapse; }
  .doc-table th {
    text-align: left;
    padding: 6px 10px;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    border-bottom: 1px solid var(--border);
  }
  .doc-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .doc-table tr:hover td { background: var(--hover); }
  .doc-table .name-cell { color: var(--text-bright); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .doc-table .path-cell { color: var(--text-dim); font-size: 11px; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--mono); }

  .status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .status-registered   { background: #1e3a5f; color: #69b8f7; }
  .status-parsed       { background: #1e3a2e; color: var(--green); }
  .status-enriched     { background: #2d2d00; color: var(--yellow); }
  .status-discovered   { background: #1a2d3d; color: #79b8ff; }
  .status-downloading  { background: #1e2a1e; color: #73c9a0; }
  .status-downloaded   { background: #1e3a2e; color: var(--green); }
  .status-indexing     { background: #2d2800; color: #e2c08d; }
  .status-indexed      { background: #1a3020; color: #6cc644; }
  .status-needs_reindex{ background: #2e2400; color: var(--yellow); }
  .status-deleted      { background: #262626; color: #666; }
  .status-failed       { background: #3a1e1e; color: var(--red); }
  .status-queued       { background: #162816; color: #8fba8f; font-size:9px; padding:2px 5px; }

  .btn-sm { padding: 4px 10px; font-size: 12px; }

  .spinner-inline {
    display: inline-block; width: 10px; height: 10px;
    border: 2px solid var(--accent); border-top-color: transparent;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-right: 4px; vertical-align: middle;
  }

  .sync-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 5px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .sync-toolbar .sep { flex: 1; }

  input[type="checkbox"].doc-cb { cursor: pointer; accent-color: var(--accent); }

  /* Formular */
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; color: var(--text-dim); font-size: 11px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-row input, .form-row textarea, .form-row select {
    width: 100%;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    outline: none;
  }
  .form-row input:focus, .form-row textarea:focus { border-color: var(--accent); }

  .btn {
    padding: 7px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font);
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--tag-bg); color: var(--text); }
  .btn-secondary:hover { background: var(--border); }
  .btn-ghost { background: none; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }

  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .search-bar input { flex: 1; }

  /* ------------------------------------------------------------------ */
  /* Chat (rechts)                                                       */
  /* ------------------------------------------------------------------ */
  #chat-panel {
    width: 360px;
    min-width: 280px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 100%;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .msg .sender {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .msg.user .sender { color: var(--accent); }
  .msg.agent .sender { color: var(--green); }
  .msg.system .sender { color: var(--text-dim); }

  .msg .bubble {
    background: var(--panel2);
    border-radius: 6px;
    padding: 8px 12px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.user .bubble { background: var(--accent2); color: #fff; }
  .msg.agent .bubble { background: var(--panel2); }
  .msg.system .bubble { background: transparent; color: var(--text-dim); font-size: 11px; font-style: italic; padding: 0; }

  .tool-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--yellow);
    font-size: 11px;
    padding: 4px 8px;
    background: #2a2700;
    border-radius: 4px;
    border: 1px solid #4a4400;
  }
  .tool-indicator .spinner {
    width: 10px; height: 10px;
    border: 2px solid var(--yellow);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Persistenter Tool-Call-Block (Phase 2a Foundry-Agent) */
  .tool-call {
    font-size: 11px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--yellow);
    border-radius: 4px;
    margin: 2px 0;
    padding: 0;
  }
  .tool-call summary {
    cursor: pointer;
    padding: 6px 10px;
    color: var(--text-dim);
    list-style: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tool-call summary::-webkit-details-marker { display: none; }
  .tool-call summary::before {
    content: '▶';
    font-size: 8px;
    color: var(--text-dim);
    transition: transform 0.15s;
  }
  .tool-call[open] summary::before { transform: rotate(90deg); }
  .tool-call .tool-name { color: var(--yellow); font-weight: 600; }
  .tool-call .tool-status { color: var(--green); font-size: 10px; margin-left: auto; }
  .tool-call .tool-status.pending { color: var(--yellow); }
  .tool-call .tool-body {
    padding: 0 10px 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .tool-call .tool-args, .tool-call .tool-result {
    font-family: var(--mono);
    font-size: 10px;
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px 8px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 160px;
    overflow-y: auto;
  }
  .tool-call .tool-label { color: var(--text-dim); font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tool-call.code-interpreter { border-left-color: var(--accent); }
  .tool-call.file-search { border-left-color: var(--green); }

  /* Thread-Tab-Leiste (Multi-Chat) */
  #chat-tabs {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    overflow-x: auto;
    flex-shrink: 0;
    min-height: 32px;
  }
  #chat-tabs::-webkit-scrollbar { height: 4px; }
  #chat-tabs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .chat-tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--panel2);
    border-right: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    max-width: 180px;
    flex-shrink: 0;
  }
  .chat-tab:hover { background: var(--panel); color: var(--text); }
  .chat-tab.active {
    background: var(--panel);
    color: var(--text-bright);
    border-bottom: 2px solid var(--accent);
    margin-bottom: -1px;
  }
  .chat-tab .tab-title {
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 120px;
  }
  .chat-tab .tab-close {
    color: var(--text-dim);
    font-size: 12px;
    padding: 0 2px;
    border-radius: 2px;
  }
  .chat-tab .tab-close:hover { background: var(--red, #c44); color: #fff; }
  .chat-tab-new {
    padding: 6px 12px;
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chat-tab-new:hover { background: var(--panel2); color: var(--text-bright); }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 12px;
    color: var(--text-dim);
    font-size: 12px;
  }
  .typing-dot {
    width: 6px; height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); } 40% { transform: scale(1); } }

  #chat-input-area {
    border-top: 1px solid var(--border);
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #chat-input {
    width: 100%;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    resize: none;
    outline: none;
    min-height: 60px;
    max-height: 150px;
  }
  #chat-input:focus { border-color: var(--accent); }

  .chat-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .chat-hint { color: var(--text-dim); font-size: 10px; }

  /* ------------------------------------------------------------------ */
  /* Scrollbars                                                          */
  /* ------------------------------------------------------------------ */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #424242; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }

  /* ------------------------------------------------------------------ */
  /* Utility                                                             */
  /* ------------------------------------------------------------------ */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }

  .alert { padding: 10px 14px; border-radius: 5px; margin-bottom: 12px; font-size: 12px; }
  .alert-info { background: #1e3a5f; border-left: 3px solid var(--accent); color: #9fcfff; }
  .alert-warn { background: #3a2e00; border-left: 3px solid #d7ba7d; color: #d7ba7d; }
  .alert-ok   { background: #1e3a2e; border-left: 3px solid var(--green); color: var(--green); }

  code { font-family: var(--mono); background: var(--tag-bg); padding: 1px 5px; border-radius: 3px; font-size: 12px; }

  .loading { display: flex; align-items: center; gap: 8px; color: var(--text-dim); }
</style>
</head>
<body>

<!-- Titelleiste -->
<div id="titlebar">
  <span class="logo">BEW DOKU</span>
  <span class="subtitle">Agentisches Dokumentenmanagementsystem</span>
  <div class="spacer"></div>
  <div class="stats-bar" id="titlebar-stats">
    <span>📁 <span id="stat-projects">—</span> Projekte</span>
    <span>📄 <span id="stat-docs">—</span> Dokumente</span>
  </div>
</div>

<div id="workspace">

  <!-- ================================================================ -->
  <!-- EXPLORER                                                          -->
  <!-- ================================================================ -->
  <div id="explorer">
    <div class="panel-title">
      Explorer
      <button title="Neu laden" onclick="loadExplorer()">↻</button>
    </div>
    <div id="explorer-tree">
      <div class="loading" style="padding:12px 12px;">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
        &nbsp;Lade ...
      </div>
    </div>
  </div>

  <!-- ================================================================ -->
  <!-- HAUPTBEREICH                                                      -->
  <!-- ================================================================ -->
  <div id="main">
    <div id="main-tabs">
      <div class="tab active" data-view="dashboard">🏠 Dashboard</div>
    </div>
    <div id="main-content">
      <!-- Inhalt wird per JS gesetzt -->
    </div>
  </div>

  <!-- ================================================================ -->
  <!-- CHAT                                                              -->
  <!-- ================================================================ -->
  <div id="chat-panel">
    <div class="panel-title">
      Agent
      <button title="Thread schliessen" onclick="closeCurrentThread()">✕</button>
    </div>
    <div id="chat-tabs">
      <!-- Tabs werden dynamisch via renderThreadTabs() erzeugt -->
      <div class="chat-tab-new" onclick="createNewThread()" title="Neuer Chat">+</div>
    </div>
    <div id="chat-messages">
      <div class="msg system">
        <div class="bubble">Verbindung wird hergestellt ...</div>
      </div>
    </div>
    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="Nachricht an den Agenten ..." rows="2"></textarea>
      <div class="chat-actions">
        <span class="chat-hint">Enter = Senden &nbsp;·&nbsp; Shift+Enter = Zeilenumbruch</span>
        <button class="btn btn-primary" onclick="sendMessage()">Senden ▶</button>
      </div>
    </div>
  </div>

</div>

<script>
// =========================================================================
// State
// =========================================================================
const state = {
  projects: [],
  activeProjectId: null,
  activeView: 'dashboard',
  // Multi-Thread-Chat (Phase 2a Foundry)
  threads: [],            // [{id, title, status, foundry_thread_id, ...}]
  activeThreadId: null,
  ws: null,
  wsReady: false,
  wsThreadId: null,       // Thread-ID, auf die der aktuelle WebSocket verbunden ist
};

const _syncPollers    = {};   // sourceId → interval handle
const _spFieldsVisible = {};  // sourceId → bool
const _spFieldNames    = {};  // sourceId → string[]
let   _selectedDocs    = new Set(); // doc IDs currently checked

// =========================================================================
// WebSocket — pro Thread ein eigener Socket (serverseitig durch thread_id gebunden)
// =========================================================================
function connectWS(threadId) {
  if (!threadId) return;
  // Alten Socket schliessen, wenn vorhanden und auf anderer Thread-ID
  if (state.ws && state.wsThreadId !== threadId) {
    try { state.ws.close(); } catch(e) {}
    state.ws = null;
    state.wsReady = false;
  }
  if (state.ws && state.wsThreadId === threadId) return; // bereits offen

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  state.ws = new WebSocket(`${proto}//${location.host}/ws/chat?thread_id=${threadId}`);
  state.wsThreadId = threadId;

  state.ws.onopen = () => {
    state.wsReady = true;
  };

  state.ws.onclose = () => {
    state.wsReady = false;
    // Nur reconnect, wenn dieser Socket noch der "aktive" ist
    if (state.wsThreadId === threadId && state.activeThreadId === threadId) {
      setTimeout(() => connectWS(threadId), 2000);
    }
  };

  state.ws.onerror = () => {
    state.wsReady = false;
  };

  state.ws.onmessage = (ev) => {
    const data = JSON.parse(ev.data);
    handleAgentChunk(data);
  };
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  return res.json();
}

async function loadExplorer() {
  const tree = document.getElementById('explorer-tree');
  tree.innerHTML = '<div class="loading" style="padding:12px"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';

  const projects = await apiFetch('/api/projects');
  state.projects = projects;
  updateTitleStats();

  tree.innerHTML = '';

  // Projekte
  const section = document.createElement('div');
  section.className = 'tree-section';

  const header = document.createElement('div');
  header.className = 'tree-section-header open';
  header.innerHTML = `<span class="arrow">▶</span> PROJEKTE <span style="margin-left:auto;font-size:10px">${projects.length}</span>`;
  header.onclick = () => {
    header.classList.toggle('open');
    body.style.display = header.classList.contains('open') ? 'block' : 'none';
  };
  section.appendChild(header);

  const body = document.createElement('div');
  section.appendChild(body);

  if (projects.length === 0) {

  }

    item.dataset.projectId = p.id;
    item.innerHTML = `<span class="icon">📁</span><span class="label">${escHtml(p.name)}</span><span class="badge">${p.document_count}</span>`;
    item.onclick = () => selectProject(p.id);
    body.appendChild(item);

    // Quellen unter dem Projekt
    const sources = await apiFetch(`/api/projects/${p.id}/sources`);
    for (const s of sources) {
      const sub = document.createElement('div');
      sub.className = 'tree-item tree-sub-item';
      const syncIcon = s.last_synced_at ? '🔗' : '⚠️';
      sub.innerHTML = `<span class="icon">${syncIcon}</span><span class="label">${escHtml(s.name)}</span><span class="badge">${s.document_count}</span>`;
      sub.onclick = (e) => { e.stopPropagation(); openSourceView(p.id, s.id, s.name); };
      body.appendChild(sub);
    }
  }

  tree.appendChild(section);

  // Trennlinie + Schnellaktionen
  tree.insertAdjacentHTML('beforeend', `
    <div style="padding:10px 12px 4px;border-top:1px solid var(--border);margin-top:8px">
      <div class="tree-section-header" style="padding:0;margin-bottom:6px;cursor:default">AKTIONEN</div>
      <div class="tree-item" onclick="openView('new-project')"><span class="icon">➕</span><span class="label">Neues Projekt</span></div>
      <div class="tree-item" onclick="openView('new-source')"><span class="icon">🔌</span><span class="label">Quelle hinzufügen</span></div>
    </div>
  `);
}

function updateTitleStats() {
  const totalDocs = state.projects.reduce((s, p) => s + p.document_count, 0);
  document.getElementById('stat-projects').textContent = state.projects.length;
  document.getElementById('stat-docs').textContent = totalDocs;

// =========================================================================
// Projekt auswählen
// =========================================================================
function selectProject(projectId) {
  state.activeProjectId = projectId;
  // Explorer-Markierung aktualisieren
  document.querySelectorAll('[data-project-id]').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.projectId) === projectId);
  });
  openView('project', { projectId });
}

// =========================================================================
// Views
// =========================================================================
function openView(view, params = {}) {
  state.activeView = view;
  const content = document.getElementById('main-content');
  updateTabs(view, params);

  if (view === 'dashboard') {
    renderDashboard();
  } else if (view === 'project') {
    renderProjectView(params.projectId);
  } else if (view === 'source') {
    renderSourceView(params.projectId, params.sourceId, params.sourceName);
  } else if (view === 'new-project') {
    renderNewProjectForm();
  } else if (view === 'new-source') {
    renderNewSourceForm();
  }
}

function updateTabs(view, params = {}) {
  const tabsEl = document.getElementById('main-tabs');
  // Wir halten Dashboard immer offen
  const labels = {
    dashboard: '🏠 Dashboard',
    project: `📁 ${params.projectId ? (state.projects.find(p=>p.id===params.projectId)?.name || 'Projekt') : 'Projekt'}`,
    source: `🔗 ${params.sourceName || 'Quelle'}`,
    'new-project': '➕ Neues Projekt',
    'new-source': '🔌 Neue Quelle',
  };
  const existing = tabsEl.querySelector(`[data-view="${view}"]`);
  if (!existing) {
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.dataset.view = view;
    tab.dataset.params = JSON.stringify(params);
    tab.innerHTML = `${labels[view] || view} <span class="close-tab" onclick="closeTab(event, this.parentElement)">×</span>`;
    tab.onclick = (e) => { if (!e.target.classList.contains('close-tab')) openView(view, params); };
    tabsEl.appendChild(tab);
  }
  tabsEl.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
}

function closeTab(e, tab) {
  e.stopPropagation();
  tab.remove();
  const tabs = document.querySelectorAll('.tab');
  if (tabs.length > 0) {
    const last = tabs[tabs.length - 1];
    openView(last.dataset.view, JSON.parse(last.dataset.params || '{}'));
  }
}

function openSourceView(projectId, sourceId, sourceName) {
  openView('source', { projectId, sourceId, sourceName });
}

  }

    `<th style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escAttr(f)}">${escHtml(f)}</th>`

    const nameHtml = d.sp_web_url
      ? `<a href="${escAttr(d.sp_web_url)}" target="_blank"

      : `<span style="color:var(--text-bright)">${escHtml(d.original_name)}</span>`;
    const modDate = d.sp_modified_at ? d.sp_modified_at.slice(0,10) : '—';
    const modBy   = d.sp_modified_by
      ? escHtml(d.sp_modified_by.length > 16 ? d.sp_modified_by.slice(0,14)+'…' : d.sp_modified_by)

    const spCells = spFields.map(f =>
      `<td style="color:var(--text-dim);font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
           title="${escAttr((d.sp_fields||{})[f]||'')}">${escHtml((d.sp_fields||{})[f]||'')}</td>`

      <td style="width:32px;padding:4px 8px">
        <input type="checkbox" class="doc-cb" data-id="${d.id}" ${sel?'checked':''}

// =========================================================================
// Sync (Snapshot / Delta)
// =========================================================================
async function startSync(projectId, sourceId, mode) {
  const btnId = mode === 'snapshot' ? `btn-snapshot-${sourceId}` : `btn-delta-${sourceId}`;
  const btn = document.getElementById(btnId);
  if (btn) { btn.disabled = true; btn.textContent = '⏳ …'; }

  const res = await apiFetch(`/api/sources/${sourceId}/${mode}`, { method: 'POST' });
  const bar = document.getElementById(`sync-status-bar-${sourceId}`);
  if (bar) bar.innerHTML = renderSyncStatusText(res);

  if (res.status === 'gestartet' || res.status === 'running' || res.status === 'already_running') {
    startSyncPolling(projectId, sourceId);
  }
  if (btn) { btn.disabled = false; btn.textContent = mode === 'snapshot' ? '📸 Snapshot' : '⟳ Delta Sync'; }
}

function renderSyncStatusText(status) {
  if (!status || status.status === 'idle') {
    return 'Kein aktiver Sync. Starte einen Snapshot (erste Ausführung) oder Delta Sync (nur Änderungen).';
  }
  if (status.status === 'running') {
    const m = status.mode === 'snapshot' ? 'Snapshot' : 'Delta Sync';
    return `<span class="spinner-inline"></span> <strong>${m}</strong> läuft …`;
  }
  if (status.status === 'done') {
    const r = status.result || {};
    if (status.mode === 'snapshot') {
      return `✅ <strong>Snapshot</strong> abgeschlossen · <strong>${r.files_new||0}</strong> neu · `
           + `${r.files_updated_meta||0} aktualisiert · ${r.folders_upserted||0} Ordner`
           + (r.errors?.length ? ` · <span style="color:var(--red)">${r.errors.length} Fehler</span>` : '');
    } else {
      return `✅ <strong>Delta Sync</strong> abgeschlossen · <strong>${r.files_new||0}</strong> neu · `
           + `${r.files_updated_content||0} Inhalt geändert · ${r.files_updated_meta||0} Meta · `
           + `${r.files_deleted||0} gelöscht`
           + (r.errors?.length ? ` · <span style="color:var(--red)">${r.errors.length} Fehler</span>` : '');
    }
  }
  if (status.status === 'error') {
    return `❌ <strong>Fehler:</strong> ${escHtml(status.error || 'Unbekannt')}`;
  }
  if (status.status === 'already_running') {
    return `⏳ ${escHtml(status.mode||'')} läuft bereits …`;
  }
  if (status.status === 'done' && status.mode === 'import') {
    const r = status.result || {};
    return `✅ <strong>JSON-Import</strong> abgeschlossen · <strong>${r.files_new||0}</strong> neu · `
         + `${r.files_updated||0} aktualisiert · ${r.folders_upserted||0} Ordner`
         + (r.errors?.length ? ` · <span style="color:var(--red)">${r.errors.length} Fehler</span>` : '');
  }
  if (status.status === 'running' && status.mode === 'import') {
    return `<span class="spinner-inline"></span> <strong>JSON-Import</strong> läuft …`;
  }
  return escHtml(JSON.stringify(status));
}

// =========================================================================
// Browser-Script für SP-Export
// =========================================================================
function generateBrowserScript(libName) {
  const escaped = escHtml(libName || 'Dokumente');
  return `(async function exportSP() {
  const libName = prompt('Bibliotheksname:', '${escaped}');
  if (!libName) return;
  const site = window._spPageContextInfo?.webAbsoluteUrl
    || location.origin + location.pathname.replace(/\\/[^\\/]*$/, '');
  const sel = '$select=*,FileRef,FileLeafRef&$expand=Author,Editor,File,Folder';
  let url = site + "/_api/web/lists/getbytitle('" + encodeURIComponent(libName)
    + "')/items?" + sel + "&$top=5000&$orderby=ID";
  const all = [];
  while (url) {
    console.log('Lade Seite', Math.ceil(all.length/5000)+1, '…', all.length, 'Items');
    const r = await fetch(url, { headers: { Accept: 'application/json;odata=nometadata' } });
    if (!r.ok) { console.error('Fehler:', r.status); break; }
    const d = await r.json();
    all.push(...(d.value || []));
    url = d['odata.nextLink'] || null;
  }
  console.log('Fertig:', all.length, 'Items');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([JSON.stringify(all)],{type:'application/json'})),
    download: 'sp_export_' + libName + '_' + Date.now() + '.json'
  });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
})();`;
}

function toggleBrowserScript(sourceId) {
  const el = document.getElementById(`browser-script-${sourceId}`);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function copyBrowserScript(sourceId) {
  const el = document.getElementById(`browser-script-code-${sourceId}`);
  if (!el) return;
  // Decode HTML entities for copy
  const tmp = document.createElement('textarea');
  tmp.value = el.textContent;
  document.body.appendChild(tmp);
  tmp.select();
  document.execCommand('copy');
  document.body.removeChild(tmp);
  const btn = el.closest('div').querySelector('button');
  if (btn) { btn.textContent = '✓ Kopiert'; setTimeout(() => btn.textContent = 'Kopieren', 2000); }
}

// =========================================================================
// JSON-Upload
// =========================================================================
async function handleJsonUpload(event, projectId, sourceId) {
  const file = event.target.files?.[0];
  if (!file) return;
  event.target.value = '';  // Reset so same file can be re-selected

  const bar = document.getElementById(`sync-status-bar-${sourceId}`);
  if (bar) bar.innerHTML = `<span class="spinner-inline"></span> Lade '${escHtml(file.name)}' hoch …`;

  const formData = new FormData();
  formData.append('file', file);

  try {
    const resp = await fetch(`/api/sources/${sourceId}/import-json`, {
      method: 'POST',
      body: formData,
    });
    const data = await resp.json();
    if (bar) bar.innerHTML = renderSyncStatusText(data);
    if (data.status === 'gestartet') {
      startSyncPolling(projectId, sourceId);
    }
  } catch (err) {
    if (bar) bar.innerHTML = `❌ Upload-Fehler: ${escHtml(String(err))}`;
  }
}

function startSyncPolling(projectId, sourceId) {
  if (_syncPollers[sourceId]) clearInterval(_syncPollers[sourceId]);
  _syncPollers[sourceId] = setInterval(async () => {
    const status = await apiFetch(`/api/sources/${sourceId}/sync-status`);
    const bar = document.getElementById(`sync-status-bar-${sourceId}`);
    if (bar) bar.innerHTML = renderSyncStatusText(status);

    if (status.status !== 'running') {
      clearInterval(_syncPollers[sourceId]);
      delete _syncPollers[sourceId];
      // Reload doc list
      const incl = _spFieldsVisible[sourceId] ? '&include_sp_fields=true' : '';
      const docs = await apiFetch(`/api/projects/${projectId}/documents?source_id=${sourceId}&limit=5000${incl}`);
      const countEl = document.getElementById(`doc-count-${sourceId}`);
      if (countEl) countEl.textContent = `${docs.length} Dokument(e)`;
      const el = document.getElementById(`doc-list-src-${sourceId}`);
      if (el) el.innerHTML = renderSourceDocTable(docs, sourceId, projectId);
      await loadExplorer();
    }
  }, 2000);
}

async function toggleSpFields(projectId, sourceId) {
  _spFieldsVisible[sourceId] = !_spFieldsVisible[sourceId];

  if (_spFieldsVisible[sourceId] && !_spFieldNames[sourceId]) {
    const fields = await apiFetch(`/api/sources/${sourceId}/sp-fields`);
    _spFieldNames[sourceId] = fields;
  }

  const incl = _spFieldsVisible[sourceId] ? '&include_sp_fields=true' : '';
  const docs  = await apiFetch(`/api/projects/${projectId}/documents?source_id=${sourceId}&limit=5000${incl}`);
  const el    = document.getElementById(`doc-list-src-${sourceId}`);
  if (el) el.innerHTML = renderSourceDocTable(docs, sourceId, projectId);

  const btn = document.getElementById(`btn-sp-fields-${sourceId}`);
  if (btn) btn.style.color = _spFieldsVisible[sourceId] ? 'var(--accent)' : '';
}

async function filterSourceDocs(projectId, sourceId) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q    = document.getElementById(`doc-search-src-${sourceId}`)?.value || '';
    const incl = _spFieldsVisible[sourceId] ? '&include_sp_fields=true' : '';
    const docs = await apiFetch(
      `/api/projects/${projectId}/documents?source_id=${sourceId}&limit=5000&search=${encodeURIComponent(q)}${incl}`
    );
    const countEl = document.getElementById(`doc-count-${sourceId}`);
    if (countEl) countEl.textContent = `${docs.length} Dokument(e)`;
    const el = document.getElementById(`doc-list-src-${sourceId}`);
    if (el) el.innerHTML = renderSourceDocTable(docs, sourceId, projectId);
  }, 300);
}

// =========================================================================
// Checkbox-Logik
// =========================================================================
function toggleDocCb(checkbox, projectId, sourceId) {
  const id = parseInt(checkbox.dataset.id);
  const row = checkbox.closest('tr');
  if (checkbox.checked) {
    _selectedDocs.add(id);
    if (row) row.style.background = 'var(--panel2)';
  } else {
    _selectedDocs.delete(id);
    if (row) row.style.background = '';
  }
  updateSelectionToolbar(projectId, sourceId);
}

function toggleAllDocs(event, projectId, sourceId) {
  const checked = event.target.checked;
  document.querySelectorAll('.doc-cb').forEach(cb => {
    cb.checked = checked;
    const id  = parseInt(cb.dataset.id);
    const row = cb.closest('tr');
    if (checked) {
      _selectedDocs.add(id);
      if (row) row.style.background = 'var(--panel2)';
    } else {
      _selectedDocs.delete(id);
      if (row) row.style.background = '';
    }
  });
  updateSelectionToolbar(projectId, sourceId);
}

function updateSelectionToolbar(projectId, sourceId) {
  const toolbar   = document.getElementById(`sel-toolbar-${sourceId}`);
  const countEl   = document.getElementById(`sel-count-${sourceId}`);
  const n         = _selectedDocs.size;
  if (!toolbar) return;
  toolbar.style.display = n > 0 ? 'flex' : 'none';
  if (countEl) countEl.textContent = `${n} ausgewählt`;
}

async function markSelectedForIndexing(projectId, sourceId) {
  if (_selectedDocs.size === 0) return;
  const ids = [..._selectedDocs];
  const res = await apiFetch(`/api/projects/${projectId}/documents/select`, {
    method: 'POST',
    body: JSON.stringify({ ids, selected: true }),
  });
  if (res.error) { alert('Fehler: ' + res.error); return; }
  _selectedDocs.clear();
  // Reload table
  const incl = _spFieldsVisible[sourceId] ? '&include_sp_fields=true' : '';
  const docs = await apiFetch(`/api/projects/${projectId}/documents?source_id=${sourceId}&limit=5000${incl}`);
  const el   = document.getElementById(`doc-list-src-${sourceId}`);
  if (el) el.innerHTML = renderSourceDocTable(docs, sourceId, projectId);
  updateSelectionToolbar(projectId, sourceId);
}

async function selectAllAndMark(projectId, sourceId) {
  const res = await apiFetch(`/api/projects/${projectId}/documents/select-all`, {
    method: 'POST',
    body: JSON.stringify({ selected: true, source_id: sourceId }),
  });
  if (res.error) { alert('Fehler: ' + res.error); return; }
  const bar = document.getElementById(`sync-status-bar-${sourceId}`);
  if (bar) bar.innerHTML = `✅ ${res.selected_total} Dokumente zum Indexieren vorgemerkt.`;
  _selectedDocs.clear();
  const incl = _spFieldsVisible[sourceId] ? '&include_sp_fields=true' : '';
  const docs = await apiFetch(`/api/projects/${projectId}/documents?source_id=${sourceId}&limit=5000${incl}`);
  const el   = document.getElementById(`doc-list-src-${sourceId}`);
  if (el) el.innerHTML = renderSourceDocTable(docs, sourceId, projectId);
  updateSelectionToolbar(projectId, sourceId);
}

function clearDocSelection(projectId, sourceId) {
  _selectedDocs.clear();
  document.querySelectorAll('.doc-cb').forEach(cb => {
    cb.checked = false;
    const row = cb.closest('tr');
    if (row) row.style.background = '';
  });
  const cbAll = document.getElementById(`cb-all-${sourceId}`);
  if (cbAll) cbAll.checked = false;
  updateSelectionToolbar(projectId, sourceId);
}

// =========================================================================
// Chat — Multi-Thread Foundry-Agent (Phase 2a)
// =========================================================================
let currentAgentBubble = null;
let currentAgentText = '';
// Laufende Tool-Calls im aktuellen Turn: call_id -> {name, el (details), statusEl, resultEl}
const _activeToolCalls = {};

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
});

// ------------------ Thread-Management ------------------

async function initChat() {
  // 1. Bestehende Threads laden
  try {
    const res = await fetch('/api/threads?limit=50');
    state.threads = await res.json();
  } catch (e) {
    state.threads = [];
  }

  if (state.threads.length === 0) {
    // Frisch starten: einen leeren Thread anlegen
    await createNewThread();
  } else {
    // Aktuellsten Thread oeffnen
    await switchThread(state.threads[0].id);
  }
}

async function createNewThread(title) {
  try {
    const res = await fetch('/api/threads', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ title: title || 'Neuer Chat' }),
    });
    const t = await res.json();
    state.threads.unshift(t);
    await switchThread(t.id);
  } catch (e) {
    console.error('createNewThread', e);
  }
}

async function switchThread(threadId) {
  if (!threadId) return;
  state.activeThreadId = threadId;
  renderThreadTabs();
  await loadThreadMessages(threadId);
  connectWS(threadId);
  const input = document.getElementById('chat-input');
  if (input) input.focus();
}

async function closeCurrentThread() {
  if (!state.activeThreadId) return;
  const id = state.activeThreadId;
  if (!confirm('Diesen Chat schliessen (archivieren)?')) return;
  try {
    await fetch(`/api/threads/${id}`, { method: 'DELETE' });
  } catch (e) {}
  state.threads = state.threads.filter(t => t.id !== id);
  if (state.threads.length === 0) {
    await createNewThread();
  } else {
    await switchThread(state.threads[0].id);
  }
}

function renderThreadTabs() {
  const container = document.getElementById('chat-tabs');
  const newBtn = container.querySelector('.chat-tab-new');
  // Alle Tabs (ohne + Button) entfernen
  Array.from(container.children).forEach(ch => {
    if (!ch.classList.contains('chat-tab-new')) ch.remove();
  });
  for (const t of state.threads) {
    const div = document.createElement('div');
    div.className = 'chat-tab' + (t.id === state.activeThreadId ? ' active' : '');
    div.onclick = (e) => {
      if (e.target.classList.contains('tab-close')) return;
      switchThread(t.id);
    };
    div.innerHTML = `
      <span class="tab-title" title="${escAttr(t.title)}">${escHtml(t.title)}</span>
      <span class="tab-close" onclick="event.stopPropagation(); archiveThread(${t.id})" title="Tab schliessen">×</span>
    `;
    container.insertBefore(div, newBtn);
  }
}

async function archiveThread(threadId) {
  try {
    await fetch(`/api/threads/${threadId}`, { method: 'DELETE' });
  } catch (e) {}
  state.threads = state.threads.filter(t => t.id !== threadId);
  if (state.activeThreadId === threadId) {
    if (state.threads.length === 0) {
      await createNewThread();
    } else {
      await switchThread(state.threads[0].id);
    }
  } else {
    renderThreadTabs();
  }
}

async function loadThreadMessages(threadId) {
  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML = '';
  try {
    const res = await fetch(`/api/threads/${threadId}/messages`);
    const items = await res.json();
    if (!Array.isArray(items) || items.length === 0) {
      msgs.innerHTML = '<div class="msg system"><div class="bubble">Neuer Chat. Stelle eine Frage oder gib eine Aufgabe.</div></div>';
      return;
    }
    for (const m of items) {
      if (m.role === 'user') {
        appendMessage('user', m.content || '');
      } else if (m.role === 'assistant') {
        if (m.content) appendMessage('agent', m.content);
        if (Array.isArray(m.tool_calls)) {
          for (const tc of m.tool_calls) {
            // Gespeicherter Tool-Call mit Result aus der DB rendern
            const result = findHistoricResult(items, tc.call_id);
            appendToolCallBlock(tc.call_id, tc.name, tc.arguments, result, 'completed');
          }
        }
      }
      // tool-Nachrichten werden durch appendToolCallBlock bereits abgebildet
    }
  } catch (e) {
    msgs.innerHTML = '<div class="msg system"><div class="bubble">Chat konnte nicht geladen werden.</div></div>';
  }
}

function findHistoricResult(allMessages, callId) {
  for (const m of allMessages) {
    if (m.role === 'tool' && Array.isArray(m.tool_results)) {
      for (const tr of m.tool_results) {
        if (tr.call_id === callId) return tr.result;
      }
    }
  }
  return null;
}

// ------------------ Senden + Event-Handling ------------------

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !state.wsReady) return;

  input.value = '';
  input.style.height = 'auto';

  appendMessage('user', text);

  const typing = appendTyping();
  state.ws.send(JSON.stringify({ text }));
  currentAgentBubble = null;
  currentAgentText = '';
  state._typingEl = typing;
}

function handleAgentChunk(data) {
  if (state._typingEl) {
    state._typingEl.remove();
    state._typingEl = null;
  }

  switch (data.type) {
    case 'text_delta':
      if (!currentAgentBubble) {
        const msg = appendMessage('agent', '');
        currentAgentBubble = msg.querySelector('.bubble');
      }
      currentAgentText += data.text;
      currentAgentBubble.innerHTML = markdownToHtml(currentAgentText);
      scrollChat();
      break;

    case 'tool_call_start':
      appendToolCallBlock(data.call_id, data.name, null, null, 'pending');
      break;

    case 'tool_call_args':
      updateToolCallArgs(data.call_id, data.arguments);
      break;

    case 'tool_result':
      updateToolCallResult(data.call_id, data.result);
      break;

    case 'code_interpreter':
      renderCodeInterpreterEvent(data);
      break;

    case 'file_search':
      renderFileSearchEvent(data);
      break;

    case 'done':
      currentAgentBubble = null;
      currentAgentText = '';
      // Thread-Titel ggf. refreshen (Server kann spaeter Auto-Titel setzen)
      refreshThreadTitle(state.activeThreadId);
      // Explorer ggf. neu laden (falls Agent Quellen angelegt hat o.ae.)
      loadExplorer();
      break;

    case 'error':
      appendMessage('system', 'FEHLER: ' + (data.message || data.text || 'unbekannt'));
      break;

    default:
      // Stumm ignorieren
      break;
  }
}

// ------------------ Render-Helfer ------------------

function appendMessage(role, text) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="sender">${role === 'user' ? 'Du' : role === 'agent' ? 'Agent' : 'System'}</div>
    <div class="bubble">${markdownToHtml(text)}</div>
  `;
  msgs.appendChild(div);
  scrollChat();
  return div;
}

function appendTyping() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  msgs.appendChild(div);
  scrollChat();
  return div;
}

function appendToolCallBlock(callId, name, args, result, statusText) {
  const msgs = document.getElementById('chat-messages');
  const details = document.createElement('details');
  details.className = 'tool-call';
  const argsStr = args ? JSON.stringify(args, null, 2) : '...';
  const resStr = result ? (typeof result === 'string' ? result : JSON.stringify(result, null, 2)) : '';
  const statusClass = (statusText === 'pending') ? 'pending' : '';
  details.innerHTML = `
    <summary>
      <span class="tool-name">${escHtml(name)}</span>
      <span class="tool-status ${statusClass}" data-role="status">${escHtml(statusText || 'pending')}</span>
    </summary>
    <div class="tool-body">
      <div class="tool-label">Argumente</div>
      <div class="tool-args" data-role="args">${escHtml(argsStr)}</div>
      <div class="tool-label">Ergebnis</div>
      <div class="tool-result" data-role="result">${escHtml(resStr || '(ausstehend ...)')}</div>
    </div>
  `;
  msgs.appendChild(details);
  _activeToolCalls[callId] = {
    name,
    el: details,
    statusEl: details.querySelector('[data-role=status]'),
    argsEl: details.querySelector('[data-role=args]'),
    resultEl: details.querySelector('[data-role=result]'),
  };
  scrollChat();
}

function updateToolCallArgs(callId, args) {
  const tc = _activeToolCalls[callId];
  if (!tc) return;
  tc.argsEl.textContent = JSON.stringify(args, null, 2);
}

function updateToolCallResult(callId, result) {
  const tc = _activeToolCalls[callId];
  if (!tc) return;
  let pretty = result;
  try {
    pretty = JSON.stringify(JSON.parse(result), null, 2);
  } catch (e) {}
  tc.resultEl.textContent = pretty;
  tc.statusEl.textContent = 'ok';
  tc.statusEl.classList.remove('pending');
}

function renderCodeInterpreterEvent(data) {
  // data.phase: in_progress | code | interpreting | completed
  const msgs = document.getElementById('chat-messages');
  const key = '_ci_current';
  let el = state[key];
  if (data.phase === 'in_progress' || !el) {
    el = document.createElement('details');
    el.className = 'tool-call code-interpreter';
    el.open = true;
    el.innerHTML = `
      <summary>
        <span class="tool-name">Code Interpreter</span>
        <span class="tool-status pending" data-role="status">laeuft ...</span>
      </summary>
      <div class="tool-body">
        <div class="tool-label">Code</div>
        <div class="tool-args" data-role="code">(wird erstellt ...)</div>
      </div>
    `;
    msgs.appendChild(el);
    state[key] = el;
  }
  if (data.phase === 'code' && data.code) {
    el.querySelector('[data-role=code]').textContent = data.code;
  }
  if (data.phase === 'interpreting') {
    el.querySelector('[data-role=status]').textContent = 'rechnet ...';
  }
  if (data.phase === 'completed') {
    el.querySelector('[data-role=status]').textContent = 'fertig';
    el.querySelector('[data-role=status]').classList.remove('pending');
    state[key] = null;
  }
  scrollChat();
}

function renderFileSearchEvent(data) {
  const msgs = document.getElementById('chat-messages');
  const key = '_fs_current';
  let el = state[key];
  if (data.phase === 'in_progress' || !el) {
    el = document.createElement('details');
    el.className = 'tool-call file-search';
    el.innerHTML = `
      <summary>
        <span class="tool-name">File Search</span>
        <span class="tool-status pending" data-role="status">sucht ...</span>
      </summary>
      <div class="tool-body">
        <div class="tool-label">Status</div>
        <div class="tool-args" data-role="phase">in_progress</div>
      </div>
    `;
    msgs.appendChild(el);
    state[key] = el;
  }
  el.querySelector('[data-role=phase]').textContent = data.phase;
  if (data.phase === 'completed') {
    el.querySelector('[data-role=status]').textContent = 'fertig';
    el.querySelector('[data-role=status]').classList.remove('pending');
    state[key] = null;
  }
  scrollChat();
}

async function refreshThreadTitle(threadId) {
  try {
    const res = await fetch(`/api/threads/${threadId}`);
    const t = await res.json();
    const idx = state.threads.findIndex(x => x.id === threadId);
    if (idx >= 0) {
      state.threads[idx] = t;
      renderThreadTabs();
    }
  } catch (e) {}
}

function scrollChat() {
  const msgs = document.getElementById('chat-messages');
  msgs.scrollTop = msgs.scrollHeight;
}

// =========================================================================
// Mini-Markdown-Renderer
// =========================================================================
function markdownToHtml(text) {
  if (!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^#{1,3} (.+)$/gm, '<strong style="color:var(--text-bright)">$1</strong>')
    .replace(/^[-•] (.+)$/gm, '• $1')
    .replace(/\n/g, '<br>');
}

// =========================================================================
// Hilfsfunktionen
// =========================================================================
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// =========================================================================
// Init
// =========================================================================
initChat();
loadExplorer().then(() => openView('dashboard'));
