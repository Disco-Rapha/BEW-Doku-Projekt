async function openFlowInViewer(flowName) {
  if (!state.activeProjectSlug) return;
  _stopFlowPoll();
  state._flowView = 'flow';
  state._flowViewName = flowName;
  state._flowViewRunId = null;
  state._viewerOpenFile = null;
  state._viewerOpenTable = null;
  setViewerTitle('⚙ ' + flowName, 'Flow');
  ensureViewerOpen();
  await renderFlowDetails();
}

async function renderFlowDetails() {
  const slug = state.activeProjectSlug;
  const name = state._flowViewName;
  if (!slug || !name) return;
  setViewerHtml('<div class="viewer-body muted">lade …</div>');
  try {
    const d = await api(`/api/workspace/projects/${encodeURIComponent(slug)}/flows/${encodeURIComponent(name)}`);
    if (d.error && !d.name) throw new Error(d.error);

    const readmeHtml = d.readme_content
      ? `<div class="viewer-md">${renderMarkdown(d.readme_content)}</div>`
      : '<div class="muted">(Keine README.md)</div>';

    const hasRun = (d.recent_runs || []).some(r => r.status === 'running' || r.status === 'pending');
    const startBtn = hasRun
      ? '<button disabled title="Es laeuft bereits ein Run">▶ Run laeuft …</button>'
      : `<button class="btn-primary" onclick="startFlowRun('${escAttr(name)}')">▶ Neuen Run starten</button>`;

    const runsRows = (d.recent_runs || []).map(r => {
      const cost = (r.total_cost_eur || 0).toFixed(2);
      const prog = r.total_items > 0
        ? `${r.done_items || 0}/${r.total_items}${r.failed_items ? ' · '+r.failed_items+'f' : ''}`
        : '–';
      return `
        <tr class="clickable" onclick="openRunInViewer(${r.id})">
          <td>${r.id}</td>
          <td><span class="status-badge status-${escHtml(r.status)}">${escHtml(r.status)}</span></td>
          <td title="${escAttr(r.title || '')}">${escHtml(r.title || '(ohne Titel)')}</td>
          <td>${prog}</td>
          <td>${cost} €</td>
          <td class="muted">${escHtml((r.created_at || '').substring(5, 16))}</td>
        </tr>`;
    }).join('');

    const runsTable = runsRows
      ? `<table class="flow-runs-table">
           <thead><tr><th>ID</th><th>Status</th><th>Titel</th><th>Items</th><th>Kosten</th><th>Start</th></tr></thead>
           <tbody>${runsRows}</tbody>
         </table>`
      : '<div class="muted">Noch keine Runs.</div>';

    setViewerHtml(`
      <div class="viewer-toolbar">
        <span>Flow · ${escHtml(d.path)}</span>
        <span class="spacer"></span>
        <button onclick="renderFlowDetails()">↻ Neu laden</button>
        <button onclick="closeFlowView()">× Schliessen</button>
      </div>
      <div class="flow-section">
        <div class="flow-controls">${startBtn}</div>
        <h3>README.md</h3>
        ${readmeHtml}
        <h3>Letzte Runs (${(d.recent_runs||[]).length})</h3>
        ${runsTable}
      </div>
    `);
  } catch (e) {
    setViewerHtml(`<div class="viewer-body err">Fehler: ${escHtml(e.message)}</div>`);
  }
}

async function startFlowRun(flowName) {
  const slug = state.activeProjectSlug;
  const defaultTitle = `Run ${new Date().toISOString().replace('T',' ').substring(0,16)}`;
  const title = prompt('Titel fuer den Run:', defaultTitle);
  if (title === null) return;  // abgebrochen
  const configStr = prompt('Config (JSON) oder leer lassen:', '');
  if (configStr === null) return;
  let config = null;
  if (configStr.trim()) {
    try { config = JSON.parse(configStr); }
    catch (e) { alert('Ungueltiges JSON in config: ' + e.message); return; }
  }
  try {
    const body = { title: title.trim() || null };
    if (config) body.config = config;
    const resp = await fetch(`/api/workspace/projects/${encodeURIComponent(slug)}/flows/${encodeURIComponent(flowName)}/runs`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (data.error && !data.id) { alert('Fehler: ' + data.error); return; }
    await openRunInViewer(data.id);
    // Nach ~1.5s nochmal laden — Worker wechselt idR von pending auf running
    setTimeout(() => loadFlows(slug), 1500);
  } catch (e) {
    alert('Start fehlgeschlagen: ' + e.message);
  }
}

// ----- Run-Details-Ansicht ----------------------------------------------
async function openRunInViewer(runId) {
  if (!state.activeProjectSlug) return;
  _stopFlowPoll();
  state._flowView = 'run';
  state._flowViewRunId = runId;
  setViewerTitle(`▶ Run ${runId}`, 'Flow-Run');
  ensureViewerOpen();
  await renderRunDetails();
  _startFlowPoll();
}

async function renderRunDetails() {
  const slug = state.activeProjectSlug;
  const id = state._flowViewRunId;
  if (!slug || !id) return;
  try {
    const [run, itemsData, logsData] = await Promise.all([
      api(`/api/workspace/projects/${encodeURIComponent(slug)}/runs/${id}`),
      api(`/api/workspace/projects/${encodeURIComponent(slug)}/runs/${id}/items?limit=100`),
      api(`/api/workspace/projects/${encodeURIComponent(slug)}/runs/${id}/logs?tail=40`),
    ]);
    // Unterscheidung API-Error (kein `id`) vs Run-eigener Error (hat `id`).
    if (run.error && !run.id) throw new Error(run.error);

    const total = run.total_items || 0;
    const done = run.done_items || 0;
    const failed = run.failed_items || 0;
    const skipped = run.skipped_items || 0;
    const pct = total > 0 ? Math.min(100, Math.round((done + failed + skipped) / total * 100)) : 0;
    const progClass = run.status === 'paused' ? 'paused'
                    : run.status === 'failed' ? 'failed'
                    : run.status === 'done'   ? 'done'
                    : '';

    // Controls je nach Status
    let ctl = '';
    if (run.status === 'running' || run.status === 'pending') {
      ctl = `<button onclick="runPause(${id})">⏸ Pause</button>
             <button onclick="runCancel(${id}, false)">■ Cancel</button>
             <button class="btn-stop" onclick="runCancel(${id}, true)">✕ Force-Kill</button>`;
    } else if (run.status === 'paused') {
      ctl = `<button class="btn-primary" disabled title="Resume via CLI: disco flow run &lt;name&gt; (noch kein UI-Resume)">▶ Pausiert</button>
             <button onclick="runCancel(${id}, false)">■ Cancel</button>
             <button class="btn-stop" onclick="runCancel(${id}, true)">✕ Force-Kill</button>`;
    } else {
      ctl = `<span class="muted">Run beendet. Status: <span class="status-badge status-${escHtml(run.status)}">${escHtml(run.status)}</span></span>`;
    }

    const cfgStr = run.config ? JSON.stringify(run.config) : '(leer)';
    const errorBlk = run.error
      ? `<div class="flow-section"><h3>Fehler</h3><pre class="viewer-pre" style="color:var(--red)">${escHtml(run.error)}</pre></div>`
      : '';

    // Items-Liste (bis zu 100, neueste unten). Bei done: alles. Bei running: Verlauf.
    const items = itemsData.items || [];
    const itemRows = items.map(it => {
      const short = (it.input_ref || '').length > 80 ? (it.input_ref.substring(0, 77) + '…') : it.input_ref;
      const err = it.error ? `<span class="err" title="${escAttr(it.error)}">${escHtml(it.error.substring(0,60))}</span>` : '';
      return `<div class="row">
        <span>#${it.id}</span>
        <span class="status-badge status-${escHtml(it.status)}">${escHtml(it.status)}</span>
        <span class="ref" title="${escAttr(it.input_ref)}">${escHtml(short)}</span>
        <span>${err}</span>
      </div>`;
    }).join('');

    setViewerHtml(`
      <div class="viewer-toolbar">
        <span>Run ${id} · Flow <b>${escHtml(run.flow_name)}</b></span>
        <span class="spacer"></span>
        <button onclick="openFlowInViewer('${escAttr(run.flow_name)}')">⚙ Zum Flow</button>
        <button onclick="renderRunDetails()">↻ Neu laden</button>
        <button onclick="closeFlowView()">× Schliessen</button>
      </div>
      <div class="flow-section">
        <h3>${escHtml(run.title || '(ohne Titel)')}</h3>
        <div class="flow-stats-grid">
          <div class="flow-stat"><div class="lbl">Status</div><div class="val"><span class="status-badge status-${escHtml(run.status)}">${escHtml(run.status)}</span></div></div>
          <div class="flow-stat"><div class="lbl">Fortschritt</div><div class="val">${done}/${total || '?'}</div></div>
          <div class="flow-stat"><div class="lbl">Fehler</div><div class="val">${failed}</div></div>
          <div class="flow-stat"><div class="lbl">Skipped</div><div class="val">${skipped}</div></div>
          <div class="flow-stat"><div class="lbl">Kosten</div><div class="val">${(run.total_cost_eur||0).toFixed(2)} €</div></div>
          <div class="flow-stat"><div class="lbl">Tokens</div><div class="val">${(run.total_tokens_in||0).toLocaleString('de-DE')}/${(run.total_tokens_out||0).toLocaleString('de-DE')}</div></div>
        </div>
        <div class="flow-progress ${progClass}"><div class="flow-progress-bar" style="width:${pct}%"></div></div>
        <div class="flow-controls">${ctl}</div>
        <div class="muted" style="font-size:11px">Config: <code>${escHtml(cfgStr)}</code> · PID: ${run.worker_pid || '–'} · Start: ${escHtml(run.started_at || '–')} · Ende: ${escHtml(run.finished_at || '–')}</div>
      </div>
      ${errorBlk}
      <div class="flow-section">
        <h3>Log (tail 40)</h3>
        <div class="flow-logs">${escHtml(logsData.log_text || '(kein Log)')}${logsData.stderr_text ? '\n--- stderr ---\n'+escHtml(logsData.stderr_text) : ''}</div>
      </div>
      <div class="flow-section">
        <h3>Items (${items.length}${items.length >= 100 ? ' / 100+' : ''})</h3>
        <div class="flow-items-list">${itemRows || '<div class="muted">Noch keine Items.</div>'}</div>
      </div>
    `);
  } catch (e) {
    setViewerHtml(`<div class="viewer-body err">Fehler: ${escHtml(e.message)}</div>`);
  }
}

async function runPause(runId) {
  const slug = state.activeProjectSlug;
  try {
    const r = await fetch(`/api/workspace/projects/${encodeURIComponent(slug)}/runs/${runId}/pause`, {method:'POST'});
    const d = await r.json();
    if (d.error && !d.id) alert('Pause-Fehler: ' + d.error);
  } catch (e) { alert('Pause fehlgeschlagen: ' + e.message); }
  await renderRunDetails();

async function runCancel(runId, force) {
  const slug = state.activeProjectSlug;
  const msg = force
    ? 'Force-Kill: Worker wird per SIGTERM abgebrochen. Fortfahren?'
    : 'Cancel: Worker stoppt am naechsten Item-Boundary. Fortfahren?';
  if (!confirm(msg)) return;
  try {
    const r = await fetch(`/api/workspace/projects/${encodeURIComponent(slug)}/runs/${runId}/cancel`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({force: !!force}),
    });
    const d = await r.json();
    if (d.error && !d.id) alert('Cancel-Fehler: ' + d.error);
  } catch (e) { alert('Cancel fehlgeschlagen: ' + e.message); }
  await renderRunDetails();
  await loadFlows(slug);
}

// ----- Polling ----------------------------------------------------------
function _startFlowPoll() {
  _stopFlowPoll();
  let tickCount = 0;
  state._flowPoll = setInterval(async () => {
    if (state._flowView !== 'run' || !state._flowViewRunId) {
      _stopFlowPoll(); return;
    }
    try {
      const slug = state.activeProjectSlug;
      const r = await api(`/api/workspace/projects/${encodeURIComponent(slug)}/runs/${state._flowViewRunId}`);
      if (['running','pending','paused'].includes(r.status)) {
        await renderRunDetails();
        // Alle 4 Ticks (~10s) auch die Sidebar-Indikatoren aktualisieren.
        if (++tickCount % 4 === 0) loadFlows(slug);
      } else {
        await renderRunDetails();  // einmal final aktualisieren
        _stopFlowPoll();
        loadFlows(slug);  // Sidebar: running-Indikator aus
      }
    } catch (e) { /* stillschweigend — nicht spammen */ }
  }, 2500);
}

function _stopFlowPoll() {
  if (state._flowPoll) { clearInterval(state._flowPoll); state._flowPoll = null; }
}

function closeFlowView() {
  _stopFlowPoll();
  state._flowView = null;
  state._flowViewName = null;
  state._flowViewRunId = null;
  closeViewer();
}

// =========================================================================
// Run-Streifen — projekt-uebergreifend, zeigt aktive Flow-Runs
// Poll alle 3s /api/workspace/active-runs, rendert je Run eine Zeile.
// =========================================================================

state._runStripPoll = null;       // setInterval handle
state._runStripLastRuns = new Map();  // key = "slug:id" → last snapshot fuer Status-Wechsel-Erkennung
state._runStripPending = new Set();   // "slug:id" — User hat Pause/Cancel geklickt, UI sperren

const RUN_STRIP_POLL_MS = 3000;

function runStripInit() {
  // Sofort einmal fetchen (sonst Blinken), dann Intervall.
  runStripPoll();
  if (state._runStripPoll) clearInterval(state._runStripPoll);
  state._runStripPoll = setInterval(runStripPoll, RUN_STRIP_POLL_MS);
}

async function runStripPoll() {
  let data;
  try {
    data = await api('/api/workspace/active-runs');
  } catch (_e) {
    return;  // still: API kurz weg, beim naechsten Tick wieder versuchen
  }
  if (!data || !Array.isArray(data.runs)) return;

  // Status-Wechsel-Erkennung: alles was im letzten Snapshot war, aber nicht mehr
  // in der aktiven Liste, ist fertig geworden → Toast.
  const nowKeys = new Set(data.runs.map(r => `${r.project_slug}:${r.id}`));
  for (const [key, prev] of state._runStripLastRuns.entries()) {
    if (!nowKeys.has(key)) {
      // Dieser Run ist verschwunden = Endstatus erreicht. Final-Snapshot holen.
      runStripFetchFinal(prev).then(finalRun => {
        if (finalRun) runStripToast(finalRun);
      });
      state._runStripPending.delete(key);
    }
  }

  // Neuen Snapshot merken
  const newMap = new Map();
  for (const r of data.runs) {
    newMap.set(`${r.project_slug}:${r.id}`, r);
  }
  state._runStripLastRuns = newMap;

  runStripRender(data.runs);
}

async function runStripFetchFinal(prev) {
  // prev ist ein Run aus dem letzten aktiven Snapshot. Wir holen seinen
  // finalen Status (done/failed/cancelled) einmalig fuer den Toast.
  try {
    return await api(`/api/workspace/projects/${encodeURIComponent(prev.project_slug)}/runs/${prev.id}`);
  } catch (_e) {
    return null;
  }
}

function runStripRender(runs) {
  const strip = document.getElementById('run-strip');
  if (!strip) return;
  if (!runs.length) {
    strip.classList.remove('has-runs');
    strip.innerHTML = '';
    return;
  }
  strip.classList.add('has-runs');
  strip.innerHTML = runs.map(runStripRenderRow).join('');
}

function runStripRenderRow(r) {
  const key = `${r.project_slug}:${r.id}`;
  const status = r.status || 'running';
  const total = r.total_items || 0;
  const done = r.done_items || 0;
  const failed = r.failed_items || 0;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const runtime = _runStripElapsed(r.started_at || r.created_at);
  const cost = (r.total_cost_eur || 0).toFixed(2);
  const budget = (r.config && r.config.budget_eur) ? Number(r.config.budget_eur) : null;
  const overBudget = budget != null && (r.total_cost_eur || 0) > budget;

  const disabled = state._runStripPending.has(key) ? 'disabled' : '';
  const pauseLabel = status === 'paused' ? '▶ Weiter' : '⏸ Pause';
  const pauseAction = status === 'paused'
    ? `runStripResume('${escAttr(r.project_slug)}', ${r.id})`
    : `runStripPause('${escAttr(r.project_slug)}', ${r.id})`;

  const budgetStr = budget != null
    ? `${cost} / ${budget.toFixed(2)} €`
    : `${cost} €`;

  const failedStr = failed > 0 ? `<span class="run-failed">· ${failed} failed</span>` : '';

  return `
    <div class="run-row status-${escAttr(status)}" data-key="${escAttr(key)}">
      <span class="run-dot"></span>
      <span class="run-id" onclick="runStripOpenDetails('${escAttr(r.project_slug)}', ${r.id})"
            title="Details im Viewer oeffnen">#${r.id}</span>
      <span class="run-flow" title="${escAttr(r.flow_name)}">${escHtml(r.flow_name)}</span>
      <span class="run-project" title="Projekt: ${escAttr(r.project_name || r.project_slug)}">${escHtml(r.project_slug)}</span>
      <span class="run-progress">
        <span class="run-bar"><span class="run-bar-fill" style="width:${pct}%"></span></span>
        <span class="run-counts">${done}/${total} (${pct}%)${failedStr}</span>
      </span>
      <span class="run-meta">
        <span title="Laufzeit seit Start">⏱ ${runtime}</span>
        <span class="run-cost ${overBudget ? 'over-budget' : ''}" title="${budget != null ? 'Budget: ' + budget.toFixed(2) + ' €' : 'Kein Budget gesetzt'}">💶 ${budgetStr}</span>
      </span>
      <span class="run-actions">
        <button class="run-btn" onclick="${pauseAction}" ${disabled}
                title="${status === 'paused' ? 'Worker fortsetzen' : 'Worker pausieren — aktueller Item laeuft noch zu Ende'}">${pauseLabel}</button>
        <button class="run-btn run-btn-danger" onclick="runStripCancel('${escAttr(r.project_slug)}', ${r.id})" ${disabled}
                title="Run abbrechen — Done-Items bleiben">✕ Cancel</button>
      </span>
    </div>
  `;
}

function _runStripElapsed(startedAtIso) {
  if (!startedAtIso) return '—';
  const started = new Date(startedAtIso.replace(' ', 'T') + (startedAtIso.endsWith('Z') ? '' : 'Z'));
  if (isNaN(started.getTime())) return '—';
  const diffSec = Math.max(0, (Date.now() - started.getTime()) / 1000);
  if (diffSec < 60) return `${Math.round(diffSec)}s`;
  if (diffSec < 3600) return `${Math.round(diffSec / 60)}m`;
  const h = Math.floor(diffSec / 3600);
  const m = Math.round((diffSec - h * 3600) / 60);
  return `${h}h${m}m`;
}

async function runStripPause(slug, runId) {
  const key = `${slug}:${runId}`;
  state._runStripPending.add(key);
  runStripPoll();  // UI-Update mit disabled Buttons
  try {
    await fetch(`/api/workspace/projects/${encodeURIComponent(slug)}/runs/${runId}/pause`, { method: 'POST' });
  } catch (e) {
    alert(`Pause fehlgeschlagen: ${e.message}`);
  }
  state._runStripPending.delete(key);
  runStripPoll();
}

async function runStripResume(slug, runId) {
  // Ein "paused"-Run hat worker_pid != NULL nur wenn Worker noch laeuft —
  // bei Pause-Signal laeuft er zu Ende und beendet sich. Resume = neuer Run-Start
  // mit gleichem Flow, der die noch-pending Items aufgreift (Idempotenz).
  // Fuer MVP: einfachen Hinweis geben, tatsaechliches Resume macht der User ueber
  // "Flow erneut starten" im Flow-Panel.
  alert(
    'Resume-Button: im MVP muss der Run neu gestartet werden ueber ' +
    '„Neuen Run starten" im Flow-Panel. Done-Items werden dank Idempotenz uebersprungen.'
  );
}

async function runStripCancel(slug, runId) {
  const ok = confirm(
    `Run #${runId} sofort abbrechen?\n\n` +
    `• Worker wird per SIGTERM beendet — aktuell laufender Item ist verloren.\n` +
    `• Bereits abgeschlossene Items bleiben in der DB.\n` +
    `• Pending-Items werden NICHT verarbeitet.\n\n` +
    `Tipp: Wenn Du stattdessen sanft stoppen willst (Item zu Ende, dann halt),\n` +
    `nimm „⏸ Pause".\n\n` +
    `Ok = sofort abbrechen, Abbrechen = weiterlaufen lassen.`
  );
  if (!ok) return;
  const key = `${slug}:${runId}`;
  state._runStripPending.add(key);
  runStripPoll();
  try {
    await fetch(`/api/workspace/projects/${encodeURIComponent(slug)}/runs/${runId}/cancel`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ force: true }),
    });
  } catch (e) {
    alert(`Cancel fehlgeschlagen: ${e.message}`);
  }
  state._runStripPending.delete(key);
  runStripPoll();
}

async function runStripOpenDetails(slug, runId) {
  // Wechsel ins Ziel-Projekt (falls noetig), dann Run-Viewer oeffnen.
  if (state.activeProjectSlug !== slug) {
    await switchProject(slug);
  }
  if (typeof openRunInViewer === 'function') {
    await openRunInViewer(runId);
  }
}

function runStripToast(run) {
  const container = document.getElementById('run-toast-container');
  if (!container) return;
  const status = run.status || 'done';
  const total = run.total_items || 0;
  const done = run.done_items || 0;
  const failed = run.failed_items || 0;
  const skipped = run.skipped_items || 0;
  const cost = (run.total_cost_eur || 0).toFixed(2);

  const emoji = status === 'done' ? '✅'
              : status === 'failed' ? '❌'
              : status === 'cancelled' ? '⊘'
              : 'ℹ';
  const label = status === 'done' ? 'fertig'
              : status === 'failed' ? 'FEHLGESCHLAGEN'
              : status === 'cancelled' ? 'abgebrochen'
              : status;

  const slug = run.project_slug || run.project_name || '';
  const flow = run.flow_name || '?';

  const toast = document.createElement('div');
  toast.className = `run-toast status-${status}`;
  toast.innerHTML = `
    <button class="run-toast-close" title="Schliessen">✕</button>
    <div class="run-toast-title">${emoji} Run #${run.id} ${escHtml(label)}</div>
    <div class="run-toast-body">
      ${escHtml(flow)} · ${escHtml(slug)}<br>
      ${done}/${total} done${failed > 0 ? ' · <span style="color:var(--red)">' + failed + ' failed</span>' : ''}${skipped > 0 ? ' · ' + skipped + ' skipped' : ''} · ${cost} €
      ${slug ? `<br><a href="#" onclick="runStripOpenDetails('${escAttr(slug)}', ${run.id}); return false;" style="color:var(--accent)">Details oeffnen</a>` : ''}
    </div>
  `;
  const close = () => { if (toast.parentNode) toast.parentNode.removeChild(toast); };
  toast.querySelector('.run-toast-close').addEventListener('click', close);
  container.appendChild(toast);
  // Auto-close nach 10s — bei 'failed' laenger (15s)
  const ttl = status === 'failed' ? 15000 : 10000;
  setTimeout(close, ttl);
}

// Start des Run-Streifen-Pollings: sobald der DOM bereit ist.
// Wir fuegen uns in den bestehenden DOMContentLoaded-Hook ein, indem wir
// NACH dem vorhandenen addEventListener noch einen zweiten anhaengen.
// Der zweite feuert ebenfalls nach DOM-Ready.
if (document.readyState === 'loading') {
  window.addEventListener('DOMContentLoaded', runStripInit);
} else {
  runStripInit();
}
</script>
</body>
</html>
