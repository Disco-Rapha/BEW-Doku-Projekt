[project]
name = "bew"
version = "0.1.0"
description = "Lokale PDF-Verarbeitungs-Pipeline mit Azure KI-Services und SQLite-Datenhaltung"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "python-dotenv>=1.0",
    "pydantic-settings>=2.0",
    "datasette>=1.0a16",
    # Azure-Clients — aktuell als Platzhalter, Nutzung folgt in Phase 1
    "azure-ai-documentintelligence>=1.0",
    "openai>=1.50",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bew"]

[project.scripts]
bew = "bew.cli:main"
